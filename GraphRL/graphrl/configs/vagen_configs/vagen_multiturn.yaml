# =============================================================================
# VAGEN Hydra Config for GraphRL
# =============================================================================
#
# This is the Hydra entry config used by VAGEN PPO training when launched
# from GraphRL. It inherits VAGEN's base configs via searchpath and allows
# local overrides (e.g. env_registry.yaml in this directory).
#
# Searchpath uses relative paths from the GraphRL project root (CWD).

hydra:
  searchpath:
    - file://vagen/configs
    - file://verl/verl/trainer/config

defaults:
  - ppo_trainer
  - env_registry
  - _self_

# --- Multi-turn agent settings (from VAGEN vagen_multiturn.yaml) ---

data:
  max_prompt_length: 4000
  max_response_length: 10000
  train_batch_size: 256
  return_raw_chat: True
  return_multi_modal_inputs: True
  custom_cls:
    path: "vagen/gym_agent_dataset.py"
    name: AgenticDataset

actor_rollout_ref:
  hybrid_engine: True
  rollout:
    name: sglang
    multi_turn:
      enable: True

trainer:
  val_before_train: True
  skip_special_tokens_val: False
  skip_special_tokens_train: False
  replace_image_tokens_for_logging: True
  log_image:
    enable: True
    max_pending: 2
    png_compress_level: 0
  save_best_val: True 

algorithm:
  gamma: 1.0                 
  lam: 1.0  

filter:
  name: reward_variance_top_p   
  filter_kwargs:
    top_p: 0.9                 
  enable: False 

huggingface_hub:
  hf_save_freq: null
  repo_id: graphrl-vagen-training
  private: false
  upload_contents: ['actor/huggingface/**']