# =============================================================================
# Sokoban Text — GraphRL Pipeline Config
# =============================================================================
#
# Usage:
#   bash run.sh
#   bash run.sh iterations=5 experiment_dir=/my/exp
#   bash run.sh general_overrides.rl.training_steps=200
#
# train_files / val_files are injected by run.sh (need absolute paths).

hydra:
  job:
    chdir: false

project_name: sokoban
experiment_name: sokoban_text
experiment_dir: exps/${project_name}/${experiment_name}
initial_model_path: Qwen/Qwen2.5-VL-3B-Instruct
iterations: 3

# ── HF upload (per-iter, end-of-phase) ────────────────────────────────────
# At iter end, upload these resources to HF. Resources that look like an HF
# model dir (config.json + safetensors) → model repo; others → tar.gz to a
# dataset repo. See graphrl/utils/hf_uploader.py.
upload_to_hf: [rl_model, sft_model]
upload_to_hf_model_repo: sokoban_text_sft_rl
upload_to_hf_data_repo: sokoban_text_sft_rl

general_overrides:
  rl:
    training_steps: 100           # RL steps per iteration
    vagen_dir: VAGEN
    # data.train_files / data.val_files injected by run.sh
    hydra_overrides:
      data:
        max_prompt_length: 4000
        max_response_length: 4096
        train_batch_size: 64
        train_files: null
        val_files: null

      algorithm:
        adv_estimator: grpo
        kl_ctrl:
          kl_coef: 0.0

      actor_rollout_ref:
        model:
          use_remove_padding: true
          use_fused_kernels: true
          enable_gradient_checkpointing: true
        actor:
          optim:
            lr: 1.0e-6
          ppo_micro_batch_size_per_gpu: 1
          ppo_mini_batch_size: 64
          use_kl_loss: false
          kl_loss_coef: 0.0
          kl_loss_type: low_var_kl
          entropy_coeff: 0.0
          ulysses_sequence_parallel_size: 1
          checkpoint:
            save_contents: [model, hf_model, optimizer, extra]
          fsdp_config:
            param_offload: true
            optimizer_offload: true
        rollout:
          name: sglang
          log_prob_micro_batch_size_per_gpu: 1
          tensor_model_parallel_size: 1
          mode: async
          n: 1
          max_num_batched_tokens: 16384
          gpu_memory_utilization: 0.6
          enforce_eager: true
          free_cache_engine: true
          enable_chunked_prefill: true
          disable_log_stats: false
          agent:
            agent_loop_config_path: vagen/configs/agent.yaml  # relative to VAGEN/ cwd
        ref:
          log_prob_micro_batch_size_per_gpu: 1
          fsdp_config:
            param_offload: true

      critic:
        enable: true
        optim:
          lr: 1.0e-5
        model:
          use_remove_padding: true
          enable_gradient_checkpointing: true
          fsdp_config:
            param_offload: true
            optimizer_offload: true
        ppo_micro_batch_size_per_gpu: 1

      trainer:
        n_gpus_per_node: 8
        nnodes: 1
        critic_warmup: 0
        val_before_train: true
        save_freq: 20
        test_freq: 20
        max_actor_ckpt_to_keep: 1
        max_critic_ckpt_to_keep: 1
        skip_special_tokens_val: true
        log_val_generations: 32
        # project_name / experiment_name / logger injected dynamically by command_builder

      # ── Mid-RL HF push (every 200 RL steps) ─────────────────────────────
      # vagen pushes the latest hf_model checkpoint to this repo each time
      # the trainer hits hf_save_freq steps. Smoke iters with
      # training_steps<200 will simply not trigger; longer iters do.
      huggingface_hub:
        hf_save_freq: 200
        repo_id: sokoban_text_sft_rl
        private: false
        upload_contents: ['hf_model']

  traj_to_sft:
    module: graphrl.envs.sokoban.sokoban_text.SokobanTextTrajToSFT
    generators:
      - path_to_view_direct
      - path_to_view_mcq
      - view_to_path
      - state_reachable
    path_to_view:
      min_path_len: 1
      max_path_len: 3
      num_samples: 20
    view_to_path:
      num_samples: 20
    state_reachable:
      min_path_len: 1
      max_path_len: 5
      num_samples: 10
    seed: 42

  sft:
    n_gpus: 8
    hydra_overrides:
      stage: sft
      do_train: true
      finetuning_type: full
      # List all 4 dataset names from SokobanTextSFTGenerator
      dataset: path_to_view_direct,path_to_view_mcq,view_to_path,state_reachable
      template: qwen            # text-only Qwen/Qwen2/Qwen2.5 template
      cutoff_len: 8192         # state_reachable multi-turn can be long
      preprocessing_num_workers: 16
      per_device_train_batch_size: 2
      gradient_accumulation_steps: 4
      learning_rate: 2.0e-5
      num_train_epochs: 1.0
      lr_scheduler_type: cosine
      warmup_ratio: 0.1
      bf16: true
      logging_steps: 10
      save_steps: 500
      overwrite_output_dir: true
      trust_remote_code: true
      deepspeed: ds_z3_config.json
      use_fast_tokenizer: false

iteration_overrides:
  iter0:
    rl:
      training_steps: 10
    sft:
      hydra_overrides:
        num_train_epochs: 1.0
  iter1:
    rl:
      training_steps: 10
    sft:
      hydra_overrides:
        num_train_epochs: 1.0
  iter2:
    rl:
      training_steps: 10
    sft:
      hydra_overrides:
        num_train_epochs: 1.0
