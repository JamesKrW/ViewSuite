defaults:
  - ../eval_default

fileroot: ${oc.env:VIEWSUITE_ROOT}

default_chat_config:
  temperature: 0.0
  max_tokens: 2048
  top_p: 0.95

experiment:
  dump_dir: ${fileroot}/rollouts/Qwen2.5-VL-7B-Instruct
  default_max_turns: 1

run:
  backend: "sglang"
  base_seed: 0
  max_concurrent_jobs: 64
  resume: skip_completed
  live_summary: true

backends:
  sglang:
    base_url: "http://127.0.0.1:30000/v1"
    api_key: "EMPTY"
    model: "Qwen/Qwen2.5-VL-7B-Instruct"
    max_concurrency: 2
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
