defaults:
  - ../eval_default

fileroot: ${oc.env:VIEWSUITE_ROOT}

default_chat_config:
  temperature: 0
  max_tokens: 512
  top_p: 1.0


experiment:
  dump_dir: ${fileroot}/rollouts/gpt4o
  default_max_turns: 1

run:
  backend: "openai"
  base_seed: 0
  max_concurrent_jobs: 24
  resume: skip_completed
  live_summary: true

backends:
  openai:
    api_key: ""               # or export OPENAI_API_KEY
    base_url: null
    model: "gpt-4o"
    max_concurrency: 24
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
