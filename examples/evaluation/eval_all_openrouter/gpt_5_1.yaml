defaults:
  - eval_default

default_chat_config:
  temperature: 0.0
  max_tokens: 10000
  top_p: 0.95
  extra_body:
    reasoning:
      effort: "medium"

experiment:
  dump_dir: ${fileroot}/rollouts/gpt_5_1
  default_max_turns: 1

run:
  backend: "openai"
  base_seed: 0
  max_concurrent_jobs: 24
  resume: skip_completed
  live_summary: true

backends:
  openai:
    api_key: ${oc.env:OPENROUTER_API_KEY}  # export OPENROUTER_API_KEY
    base_url: "https://openrouter.ai/api/v1"
    model: "openai/gpt-5.1"
    max_concurrency: 24
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
